spring:
  datasource:
    url: jdbc:postgresql://db:5432/urbano
    username: postgres
    password: postgres

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
  
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 50MB


jwt:
  secret: ${JWT_SECRET}
  expiration-ms: 86400000

upload:
  dir: /app/uploads